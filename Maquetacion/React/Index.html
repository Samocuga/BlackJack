<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/styles.css">
    <title>Maquetacion Nomina</title>
  </head>
  <body>
    <header id="header">
      <div class="center">
        <!--Logo-->
        <div id="logo">
          <img src="assets/images/LogoBJ.png" class="App-logo" alt="Logotipo">  
          <span id="brand">
            <strong>Black</strong>Jack
          </span>

        </div>

        <!--Menu-->
        <nav id="menu">
          <ul>
            <li>
              <a href="Index.html">Inicio</a>
            </li>
            <li>
              <a href="Blog.html">Explicacion</a>
            </li>
            <li>
              <a href="Formulario.html">Formulario</a>
            </li>
            <li>
              <a href="">Test 1</a>
            </li>
            <li>
              <a href="">Test 2</a>
            </li>
          </ul>
        </nav>
        <!--Limpiar flotados-->
        <div class="clearfix"></div>

      </div>
    </header>

    <div id="slider" class="slider-big">
      <h1>Bienvenido a BlackJack</h1>
      <a href="#" class="btn-white">Ir Al Blog</a>
    </div>

    <div class="center">
      <section id="content">
        <h2 class="subheader">Articulos</h2>

        <script type="text/javascript">
          window.addEventListener("load", function(){
            var template = document.getElementById("article-template");
            var articles = document.getElementById("articles");

              for (var i = 1; i <=5; i++){
                var clonado = template.cloneNode(true);
                clonado.removeAttribute("id");

                var h2 = clonado.getElementsByTagName("h2")[0];
                console.log(h2);

                h2.innerHTML = h2.textContent + ' ' + i;

                articles.appendChild(clonado);
              }
            });
          
        </script>

        <!-- Listado Articulos  -->
        <div id="articles">
          <article class="article-item" id="article-template">
            <div class="image-wrap">
              <img src="assets/images/Baloncesto.jpeg" alt="Baloncesto">
            </div>
            <h2>Articulo Test</h2>
               <span class="date">
                Hace 5 min
              </span>

              <a href="#">Leer Mas</a>
            
            <div class="clearfix"></div>
          </article>
        </div>
      </section>

      <aside id="sidebar">

        <div id="nav-blog" class="sidebar-item">
          <h3>Puedes hacer esto</h3>
          <a href="#" class="btn btn-success">Crear articulo</a>
        </div>

        <div id="search" class="sidebar-item">
          <h3>Buscador</h3>
          <p>Consigue el articulo deseado</p>
          <form action="">
            <input type="text" name="search" id="">
            <input type="submit" value="buscar" name="submit" class="btn">
          </form>
        </div>
      </aside>

      <div class="clearfix"></div>

    </div>

    <footer id="footer">
      <div class="center">
        <p>
          &copy; Blackjack 2023 React
        </p>
      </div>

    </footer>

  </body>
</html>
